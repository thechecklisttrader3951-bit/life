function b2u(b){return Uint8Array.from(atob(b),function(c){return c.charCodeAt(0);});}
async function unlock(){
  var code=(document.getElementById('pin').value||'').trim();
  var e=document.getElementById('e'); e.textContent='Unlocking…';
  try{
    var bk=await crypto.subtle.importKey('raw',new TextEncoder().encode(code),{name:'PBKDF2'},false,['deriveKey']);
    var k=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b2u(SALT),iterations:150000,hash:'SHA-256'},bk,{name:'AES-GCM',length:256},false,['decrypt']);
    var pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b2u(IV)},k,b2u(CT));
    var html=new TextDecoder().decode(pt);
    try{sessionStorage.setItem('aj_lcc_ok','1');}catch(_){}
    document.open(); document.write(html); document.close();
  }catch(err){
    e.textContent='Wrong code. Try again.';
    var p=document.getElementById('pin'); p.value=''; p.focus();
  }
}
document.getElementById('go').addEventListener('click',unlock);
document.getElementById('pin').addEventListener('keydown',function(ev){if(ev.key==='Enter')unlock();});
setTimeout(function(){document.getElementById('pin').focus();},100);
</script>
